<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnold Zamora | Desarrollador de Élite</title>
    <meta name="description" content="Portafolio y enlaces de Arnold Zamora, Arquitecto de Software y Creador.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Spotify Iframe API -->
    <script src="https://open.spotify.com/embed-api/v1/iframe-api.js" async></script>
</head>
<body class="text-white selection:bg-white selection:text-black overflow-hidden">
    
    <!-- Custom Cursor -->
    <div id="custom-cursor" class="pointer-events-none fixed z-[999] opacity-0 transition-opacity duration-500">
        <div class="cursor-dot"></div>
        <div class="cursor-outline"></div>
    </div>

    <!-- Background Experience -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-[#050508]">
        <div id="tech-debris" class="absolute inset-0 z-[1]"></div>
        <video autoplay loop muted playsinline class="w-full h-full object-cover opacity-40">
            <source src="videos/Cyberpunk_Hacker_Animation_Generated.mp4" type="video/mp4">
        </video>
        
        <div class="absolute inset-0 bg-gradient-to-br from-black/80 via-[#0a0a14]/60 to-black/90"></div>
        <div class="noise-overlay absolute inset-0 opacity-[0.03]"></div>
        <div class="ambient-orb ambient-orb-one"></div>
        <div class="ambient-orb ambient-orb-two"></div>
        <div class="ambient-grid"></div>
        
        <!-- Particles -->
        <canvas id="particle-canvas" class="absolute inset-0 opacity-50 mix-blend-screen"></canvas>
        
        <!-- Ambient Music Glow -->
        <div id="ambient-music-glow" class="absolute inset-0 z-[2] opacity-0 pointer-events-none transition-opacity duration-1000"></div>
        
        <!-- Music Player UI -->
        <div id="spotify-player-container" class="fixed bottom-6 right-6 z-[60] transition-all duration-700 translate-y-20 opacity-0">
            <div class="spotify-glass-card group/player">
                <div id="spotify-embed"></div>
                <div class="player-controls-overlay">
                    <div class="track-info">
                        <div class="track-visualizer">
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                        <div class="text-xs font-mono tracking-widest text-white/40 uppercase">System Audio: Active</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Experience Overlay -->
    <div id="enter-overlay" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex flex-col items-center justify-center cursor-pointer transition-all duration-1000">
        <div class="text-center space-y-8 group">
            <div class="relative w-20 h-20 mx-auto flex items-center justify-center">
                <div class="absolute inset-0 border-2 border-white/10 rounded-full animate-ping"></div>
                <div class="w-16 h-16 border-2 border-white/20 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:border-white/50 transition-all duration-500">
                    <i class="fas fa-fingerprint text-white/50 text-2xl group-hover:text-white transition-colors"></i>
                </div>
            </div>
            <div class="space-y-3">
                <p class="text-[10px] tracking-[0.5rem] text-white/60 font-light uppercase group-hover:text-white transition-all duration-500">
                    Estableciendo Conexión
                </p>
                <p class="text-[8px] text-white/20 font-mono tracking-widest uppercase">Protocolo Arnold Zamora v10.0</p>
            </div>
        </div>
    </div>

    <!-- Main Content Container -->
    <main class="relative z-10 min-h-screen flex items-center justify-center p-4 sm:p-8 opacity-0 transition-opacity duration-1000" id="main-content">
        <div id="profile-card" class="glass-ultimate w-full max-w-[420px] p-6 sm:p-10 text-center relative overflow-hidden" style="transform-style: preserve-3d;">
            <div class="card-tech-border"></div>
            <div class="card-glow"></div>
            <div class="card-scanlines"></div>
            <div class="card-spotlight"></div>
            
            <!-- Profile Section -->
            <div class="profile-group relative z-10 mx-auto w-28 h-28 sm:w-32 sm:h-32 mb-6 sm:mb-8 float-soft cursor-pointer">
                <div class="avatar-container w-full h-full rounded-full p-1 bg-gradient-to-tr from-blue-500/20 to-emerald-500/20">
                    <img src="img/ChatGPT Image 19 abr 2026, 09_43_16 p.m..png" alt="Arnold Zamora" class="w-full h-full rounded-full object-cover avatar-neon">
                </div>
                <div class="avatar-orbit"></div>
                <div class="status-dot absolute bottom-2 right-2 bg-[#10b981] w-4 h-4 rounded-full border-4 border-[#050508] shadow-[0_0_15px_rgba(16,185,129,0.8)]"></div>
            </div>

            <!-- Identity -->
            <div class="relative z-10 space-y-1 mb-6">
                <div class="flex items-center justify-center gap-3">
                    <h1 class="hero-title text-3xl sm:text-4xl font-bold tracking-tight bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent" data-text="Arnold Zamora">Arnold Zamora</h1>
                    <div class="premium-badge px-2 py-0.5 rounded border border-blue-500/30 bg-blue-500/5">
                        <i class="fas fa-microchip text-[10px] text-blue-400"></i>
                    </div>
                </div>
                <div class="min-h-[1.5rem] flex justify-center items-center">
                    <p class="text-xs sm:text-sm text-white/40 font-mono tracking-widest">
                        <span id="dynamic-role"></span><span class="cursor-blink"></span>
                    </p>
                </div>
            </div>

            <!-- Location -->
            <div class="location-badge relative z-10 inline-flex items-center gap-3 px-5 py-2 rounded-full text-[9px] font-bold uppercase tracking-[0.3em] mx-auto mb-8 bg-white/[0.03] border border-white/5 backdrop-blur-md">
                <span class="flex h-1.5 w-1.5 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span>
                </span>
                <span class="text-white/60">LIMA, PERÚ</span>
            </div>

            <!-- Navigation Links -->
            <div class="relative z-10 flex flex-col gap-4">
                
                <a href="https://github.com/ArnoldZamoratec" target="_blank" rel="noopener noreferrer" class="link-btn github-btn">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fab fa-github"></i></div>
                        <span class="text-sm font-medium tracking-wide">Desarrollo & Repo</span>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] opacity-30"></i>
                </a>

                <a href="https://www.instagram.com/0xarnold/" target="_blank" rel="noopener noreferrer" class="link-btn instagram-btn">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fab fa-instagram"></i></div>
                        <span class="text-sm font-medium tracking-wide">Creative Flow</span>
                    </div>
                    <i class="fas fa-chevron-right text-[10px] opacity-30"></i>
                </a>

                <button id="spotify-toggle" class="link-btn spotify-btn w-full">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fab fa-spotify"></i></div>
                        <span class="text-sm font-medium tracking-wide">Soundscape Elite</span>
                    </div>
                    <div class="audio-visualizer active">
                        <span></span><span></span><span></span>
                    </div>
                </button>

            </div>

            <!-- Footer -->
            <div class="relative z-10 mt-10 opacity-30 hover:opacity-100 transition-opacity duration-500">
                <div class="h-[1px] w-12 bg-white/10 mx-auto mb-6"></div>
                <p class="text-[9px] font-mono tracking-[0.2em] uppercase">Built for Innovation</p>
            </div>

        </div>
    </main>

    <!-- Project Logic -->
    <script src="script.js"></script>
</body>
</html>
